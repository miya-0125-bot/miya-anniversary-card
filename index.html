<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <meta name="color-scheme" content="light only">
  <meta name="theme-color" content="#fff4f7" />
  <link rel="manifest" href="manifest.webmanifest">
  <title>角色紀念日卡冊 v0.44</title>
  <style>
    :root{
      color-scheme: light only;
      --bg:#fff4f7; --panel:#fffafd; --panel2:#ffe0e8; --text:#4b2e3b; --muted:#8b6877;
      --accent:#e9a7c6; --accent2:#8b7cf6; --border:rgba(255,255,255,.12);
      --cardShadow: 0 18px 48px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html{background:var(--bg); color-scheme:light}
    body{
      margin:0; font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background-color:var(--bg);
      background-image:radial-gradient(circle at top, rgba(255,255,255,0.10) 18%, transparent 38%);
      background-image:radial-gradient(circle at top, color-mix(in srgb, var(--accent) 18%, transparent), transparent 38%);
      color:var(--text); min-height:100svh;
      color-scheme:light only;
    }
    button,input,select{font:inherit}
    .app{
      max-width:460px; margin:0 auto; min-height:100svh;
      padding:calc(18px + env(safe-area-inset-top, 0px)) 18px calc(28px + env(safe-area-inset-bottom, 0px));
    }
    .topbar{display:flex; align-items:center; justify-content:space-between; margin:8px 0 18px; gap:12px;}
    .title{font-size:24px; font-weight:800; letter-spacing:.04em}
    .sub{color:var(--muted); font-size:13px; margin-top:3px}
    .topActions{display:flex; gap:8px; align-items:center}
    .pill{
      border:1px solid var(--border); background:color-mix(in srgb, var(--panel) 72%, transparent); color:var(--text);
      padding:9px 12px; border-radius:999px; cursor:pointer; white-space:nowrap;
    }
    .pill:hover{background:rgba(255,255,255,.1)}
    .roleChip{
      display:inline-flex; align-items:center; gap:8px; max-width:160px;
      border:1px solid var(--border); background:color-mix(in srgb, var(--panel) 72%, transparent); color:var(--text);
      padding:8px 10px; border-radius:999px; cursor:pointer;
    }
    .roleChip .mini{
      width:28px;height:28px;border-radius:50%; object-fit:cover; background:var(--panel2);
      display:grid; place-items:center; overflow:hidden; flex:0 0 auto; font-size:13px;
    }
    .roleChip .roleText{overflow:hidden; white-space:nowrap; text-overflow:ellipsis; font-size:13px; font-weight:700}

    .hero{
      position:relative; border-radius:28px; overflow:hidden; aspect-ratio:4/5; background:linear-gradient(160deg,var(--panel2),var(--panel));
      box-shadow:var(--cardShadow); border:1px solid var(--border);
    }
    .heroScroll{
      position:absolute; inset:0; z-index:5; overflow-y:auto; overflow-x:hidden;
      height:100%;
      scrollbar-width:none;
      -ms-overflow-style:none;
      overscroll-behavior:contain;
    }
    .heroScroll::-webkit-scrollbar{display:none}
    .heroFlow{
      height:100%;
      min-height:100%;
    }
    .heroPaneTop{
      height:100%;
      min-height:100%;
      position:relative;
      text-align:center;
    }
    .heroPaneFuture{
      min-height:185px;
      padding:10px 18px 26px;
    }
    .hero img.cover{
      width:100%;height:100%;object-fit:cover; display:block; opacity:.92;
      position:absolute; inset:0; z-index:1;
    }
    .emptyCover{
      z-index:1;
      position:absolute; inset:0; display:grid; place-items:center; text-align:center; padding:28px; color:var(--muted);
      background:var(--panel2);
      background:
        radial-gradient(circle at 20% 18%, color-mix(in srgb,var(--accent) 24%,transparent), transparent 20%),
        radial-gradient(circle at 80% 28%, color-mix(in srgb,var(--accent2) 20%,transparent), transparent 18%),
        linear-gradient(155deg, color-mix(in srgb,var(--panel2) 78%,var(--accent)), var(--panel));
    }
    .emptyHeart{font-size:42px; color:color-mix(in srgb,var(--accent) 55%,var(--muted)); opacity:.9}
    .doodles{position:absolute; inset:0; pointer-events:none; opacity:.85; z-index:2}
    .doodles span{position:absolute; color:color-mix(in srgb,var(--accent) 78%,white); font-size:28px; opacity:.75}
    .doodles span:nth-child(1){left:12%;top:10%;transform:rotate(-12deg)}
    .doodles span:nth-child(2){right:15%;top:12%;transform:rotate(14deg)}
    .doodles span:nth-child(3){left:9%;bottom:28%;transform:rotate(10deg)}
    .doodles span:nth-child(4){right:10%;bottom:35%;transform:rotate(-10deg)}
    .overlay{
      position:absolute;
      left:18px;
      right:18px;
      width:auto;
      text-align:center;
      background:transparent;
      z-index:30;
      pointer-events:none;
      display:block;
      transform:translateY(-50%);
      top:78%;
    }
    .hero.hasCover .overlay{ top:82%; }
    .hero.noCover .overlay{ top:80%; }
    .hero.hasCover .doodles{display:none}
    .hero.hasCover .overlay{background:transparent}
    .hero.noCover .overlay{background:transparent}
    .avatars{display:flex; align-items:center; justify-content:center; gap:0; margin-bottom:8px}
    .avatar{
      width:44px;height:44px;border-radius:50%; border:2px solid rgba(255,255,255,.72);
      background:var(--panel); object-fit:cover; display:grid; place-items:center; overflow:hidden;
      box-shadow:0 4px 14px rgba(0,0,0,.22);
      position:relative;
    }
    .avatar + .avatar{margin-left:-2px}
    #charAvatar{z-index:2}
    #userAvatar{z-index:1}
    .avatarNote{display:none!important}
    .label{font-size:15px; font-weight:800; text-shadow:0 2px 14px rgba(0,0,0,.55); margin-top:0; line-height:1.16}
    .days{
      font-family:"Great Vibes","Snell Roundhand","Savoye LET","Zapfino","Apple Chancery","Segoe Script",cursive;
      font-size:32px; font-weight:400; letter-spacing:.01em;
      line-height:1.10; margin-top:1px;
    }
    .since{
      font-family:"Great Vibes","Snell Roundhand","Savoye LET","Zapfino","Apple Chancery","Segoe Script",cursive;
      font-size:17px; font-weight:400; margin-top:0; line-height:1.10;
    }
    .quote{font-size:12px; color:rgba(255,255,255,.82); margin-top:3px; line-height:1.25}

    .panel{margin-top:18px; border:1px solid var(--border); border-radius:24px; background:color-mix(in srgb, var(--panel) 86%, transparent); padding:14px}
    .sectionHead{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}
    .sectionHead h2{font-size:18px; margin:0}
    .events{display:grid; gap:10px}
    .event{display:flex; align-items:center; gap:12px; padding:12px; border:1px solid var(--border); border-radius:18px; background:color-mix(in srgb, var(--panel2) 62%, transparent); cursor:pointer}
    .event.active{outline:2px solid color-mix(in srgb,var(--accent) 68%,white)}
    .icon{width:42px;height:42px;border-radius:50%; display:grid; place-items:center; background:rgba(255,255,255,.08); font-size:20px}
    .eventTitle{font-weight:800}
    .eventDate{color:var(--muted); font-size:13px; margin-top:3px}
    .eventDays{margin-left:auto; font-family:Georgia,serif; font-weight:900; font-style:italic}

    dialog{border:1px solid var(--border); border-radius:24px; background:var(--panel); color:var(--text); width:min(430px,92vw); padding:0; box-shadow:0 25px 80px rgba(0,0,0,.55)}
    dialog::backdrop{background:rgba(0,0,0,.56)}
    .modal{padding:18px}
    .modal h3{margin:0 0 12px; font-size:20px}
    .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    label{display:block; font-size:12px; color:var(--muted); margin:10px 0 5px}
    input,select{
      width:100%; border:1px solid var(--border); background:var(--panel2); color:var(--text);
      border-radius:14px; padding:11px 12px; outline:none;
      color-scheme: light only;
    }
    option{background:var(--panel); color:var(--text)}

    input[type="file"]{font-size:12px; padding:9px; color:transparent}
    input[type="file"]::file-selector-button{margin-right:10px; border:1px solid var(--border); background:rgba(255,255,255,.08); color:var(--text); border-radius:10px; padding:7px 10px; cursor:pointer}
    input[type="file"]::-webkit-file-upload-button{margin-right:10px; border:1px solid var(--border); background:rgba(255,255,255,.08); color:var(--text); border-radius:10px; padding:7px 10px; cursor:pointer}
    .fileRow.triple{grid-template-columns:1fr auto auto}
    .smallBtn:disabled{cursor:not-allowed; opacity:.45; background:rgba(255,255,255,.05)!important; color:var(--muted)!important; border:1px solid var(--border)!important}

    .fileRow{display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center}
    .actions{display:flex; gap:10px; justify-content:flex-end; margin-top:16px}
    .primary{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; border:0}
    .ghost{background:rgba(255,255,255,.06); color:var(--text); border:1px solid var(--border)}
    .danger{background:rgba(255,75,96,.12); color:#ffb4bf; border:1px solid rgba(255,75,96,.25)}
    .smallBtn{padding:8px 10px; border-radius:14px; cursor:pointer}
    .hidden{display:none!important}
    .hint{font-size:12px; color:var(--muted); line-height:1.55; margin-top:10px}
    .backupBox{
      margin-top:14px; padding:12px; border:1px solid var(--border);
      border-radius:18px; background:rgba(255,255,255,.045);
    }
    .backupTitle{font-size:13px; font-weight:800; margin-bottom:8px}
    .backupActions{display:grid; grid-template-columns:1fr 1fr; gap:8px}
    .backupNote{font-size:11px; color:var(--muted); line-height:1.45; margin-top:8px}
    .roleList{display:grid; gap:10px; max-height:65svh; overflow:auto; padding-right:2px}
    .roleItem{
      display:flex; align-items:center; gap:12px; padding:12px; border:1px solid var(--border);
      border-radius:18px; background:rgba(255,255,255,.055); cursor:pointer; color:var(--text);
    }
    .roleItem.active{outline:2px solid color-mix(in srgb,var(--accent) 68%,white)}
    .roleItem .mini{width:42px;height:42px;border-radius:50%; display:grid; place-items:center; background:var(--panel2); overflow:hidden; flex:0 0 auto}
    .roleItem img{width:100%;height:100%;object-fit:cover}
    .roleMain{font-weight:800}
    .roleSub{font-size:12px;color:var(--muted);margin-top:3px}
    .milestoneStage{
      border-radius:20px;
      padding:8px 10px 0;
      background:transparent;
    }
    .milestoneWrap{
      padding:0 2px 6px;
    }
    .milestones{display:grid; gap:10px}
    .milestone{
      display:flex; align-items:center; gap:10px;
      padding:2px 0;
      color:#fff;
      text-shadow:0 2px 8px rgba(0,0,0,.62), 0 0 18px rgba(0,0,0,.38);
    }
    .milestoneIcon{
      width:22px;height:22px;border-radius:50%;display:grid;place-items:center;
      background:rgba(255,255,255,.13); border:1px solid rgba(255,255,255,.16);
      flex:0 0 auto; font-size:11px;
    }
    .milestoneTitle{font-size:14px;font-weight:900; line-height:1}
    .milestoneDate{font-size:11px;opacity:.92;margin-top:2px;letter-spacing:.02em}
    .milestoneBadge{
      margin-left:auto;background:rgba(0,0,0,.30);color:#fff;border-radius:999px;
      padding:5px 9px;font-weight:800;min-width:52px;text-align:center;font-size:11px;
    }
    .hero:not(.hasCover) .milestone{color:var(--text); text-shadow:none}
    .hero:not(.hasCover) .milestoneBadge{background:rgba(255,255,255,.10); color:var(--text)}
.footer{display:none!important}


    .hero.hasCover .overlay,
    .hero.hasCover .overlay *{
      opacity:1!important;
      visibility:visible!important;
    }
    .hero.hasCover .label,
    .hero.hasCover .days,
    .hero.hasCover .since,
    .hero.hasCover .quote{
      color:#fff!important;
      text-shadow:0 2px 8px rgba(0,0,0,.70), 0 0 18px rgba(0,0,0,.42)!important;
    }

    .overlay > *{
      position:relative;
      z-index:31;
      opacity:1!important;
      visibility:visible!important;
    }
    .hero.hasCover .overlay{
      background:transparent!important;
    }
    .hero.hasCover .overlay > *{
      display:block;
    }
    .hero.hasCover .avatars{
      display:flex!important;
    }

    .hero.noCover .label,
    .hero.noCover .days,
    .hero.noCover .since,
    .hero.noCover .quote{
      color:var(--text)!important;
      text-shadow:none!important;
    }

    @supports not (color: color-mix(in srgb, white 50%, black)) {
      body{
        background-image:radial-gradient(circle at top, rgba(255,255,255,0.10) 18%, transparent 38%)!important;
      }
      .emptyCover{
        background:var(--panel2)!important;
      }
      .panel{
        background:var(--panel)!important;
      }
      .event{
        background:var(--panel2)!important;
      }
      .roleChip,.pill{
        background:var(--panel)!important;
      }
    }

    html.theme-midnight, body.theme-midnight{--bg:#15151b;--panel:#222129;--panel2:#2c2a35;--text:#f7f2f8;--muted:#aaa2b4;--accent:#e9a7c6;--accent2:#8b7cf6}
    html.theme-moonmist, body.theme-moonmist{--bg:#eef1f8;--panel:#ffffff;--panel2:#dce2f1;--text:#273044;--muted:#6d7487;--accent:#8e9bd8;--accent2:#b9a5e8}
    html.theme-sakura, body.theme-sakura{--bg:#fff4f7;--panel:#fffafd;--panel2:#ffe0e8;--text:#4b2e3b;--muted:#8b6877;--accent:#f2a1bd;--accent2:#d9a46f}
    html.theme-blackgold, body.theme-blackgold{--bg:#15100f;--panel:#211a18;--panel2:#362721;--text:#fff4e8;--muted:#bfae9e;--accent:#b21f3a;--accent2:#c69b52}
    html.theme-milktea, body.theme-milktea{--bg:#f3eadf;--panel:#fffaf4;--panel2:#e6d4c2;--text:#46362d;--muted:#806f64;--accent:#c79b79;--accent2:#deb7a1}
    html.theme-emerald, body.theme-emerald{--bg:#eef7f2;--panel:#ffffff;--panel2:#d9eee3;--text:#1f3b32;--muted:#668176;--accent:#62b98c;--accent2:#88a7d8}
  
    .cropDialog{width:min(94vw,460px);border:none;border-radius:24px;padding:0;background:var(--panel);color:var(--text);box-shadow:0 22px 70px rgba(0,0,0,.35)}
    .cropDialog::backdrop{background:rgba(0,0,0,.58);backdrop-filter:blur(5px)}
    .cropHead{display:flex;justify-content:space-between;align-items:center;padding:16px 16px 8px}
    .cropTitle{font-size:16px;font-weight:900}
    .cropBody{padding:0 16px 16px}
    .cropStage{position:relative;width:100%;height:58vh;max-height:520px;min-height:330px;overflow:hidden;border-radius:20px;background:#111;touch-action:none;border:1px solid var(--border)}
    .cropImg{position:absolute;left:0;top:0;transform-origin:0 0;user-select:none;-webkit-user-drag:none;max-width:none;max-height:none;will-change:transform}
    .cropFrame{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border:2px solid rgba(255,255,255,.92);box-shadow:0 0 0 9999px rgba(0,0,0,.42);border-radius:18px;pointer-events:none}
    .cropFrame.avatarFrame{border-radius:50%}
    .cropHint{font-size:12px;color:var(--muted);line-height:1.45;margin:10px 2px}
    .cropControls{display:grid;gap:8px;margin-top:10px}
    .cropControls label{font-size:12px;color:var(--muted)}
    .cropControls input[type="range"]{width:100%}
    .cropActions{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
    .cropActions .pill{padding:10px 14px}

  
    .cropPickedStatus{
      display:none;
      margin-left:8px;
      padding:3px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      color:var(--accent);
      background:rgba(255,255,255,.52);
      border:1px solid var(--border);
      vertical-align:middle;
    }
    .cropPickedStatus.show{display:inline-flex;align-items:center}
    .cropStaticNote{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
    }

  
    /* v0.35 image upload UI */
    .hiddenFile{
      position:absolute!important;
      width:1px!important;height:1px!important;
      opacity:0!important;overflow:hidden!important;
      pointer-events:none!important;
    }
    .fileRow.imageRow{
      display:grid;
      grid-template-columns:1fr 1fr auto;
      gap:8px;
      align-items:center;
    }
    .fileBtn{
      display:inline-flex!important;
      align-items:center;
      justify-content:center;
      text-align:center;
      min-height:38px;
      margin:0;
      background:var(--panel2)!important;
      color:var(--text)!important;
      border:1px solid var(--border)!important;
      box-shadow:none!important;
    }
    .danger{
      background:color-mix(in srgb, var(--accent) 12%, transparent)!important;
      color:var(--accent)!important;
      border:1px solid color-mix(in srgb, var(--accent) 34%, var(--border))!important;
    }
    .smallBtn:disabled{
      cursor:not-allowed;
      opacity:.42;
      background:rgba(255,255,255,.04)!important;
      color:var(--muted)!important;
      border:1px solid var(--border)!important;
    }
    .cropPickedStatus{
      justify-content:center;
      margin-left:0!important;
      min-height:30px;
      background:rgba(255,255,255,.38)!important;
      color:var(--accent)!important;
      border:1px solid color-mix(in srgb, var(--accent) 24%, var(--border))!important;
    }
    .cropStaticNote,.hint{display:none!important}

  
    /* v0.36 final polish */
    .heroCard{
      border-color:transparent!important;
      box-shadow:none!important;
    }
    .coverImg{
      outline:none!important;
      border:0!important;
      box-shadow:none!important;
    }

    body.theme-midnight .danger{
      background:rgba(190,176,255,.12)!important;
      color:#d8ccff!important;
      border:1px solid rgba(216,204,255,.28)!important;
    }
    body.theme-midnight .cropPickedStatus{
      background:rgba(190,176,255,.14)!important;
      color:#e1d8ff!important;
      border:1px solid rgba(216,204,255,.26)!important;
    }
    body.theme-midnight .primary{
      background:linear-gradient(135deg,#8f7cff,#c8a8ff)!important;
      color:#17151f!important;
      border:0!important;
    }

    body.theme-blackgold .danger{
      background:rgba(189,68,86,.18)!important;
      color:#ff8fa3!important;
      border:1px solid rgba(255,143,163,.36)!important;
    }
    body.theme-blackgold .cropPickedStatus{
      background:rgba(211,168,110,.14)!important;
      color:#e7c489!important;
      border:1px solid rgba(231,196,137,.34)!important;
    }


    /* v0.37 dark theme + border fix */
    .hero{
      border:0!important;
      box-shadow:none!important;
    }
    .hero img.cover{
      border:0!important;
      outline:none!important;
      box-shadow:none!important;
    }
    body.theme-midnight .event.active,
    body.theme-midnight .roleItem.active{
      outline:2px solid rgba(180, 172, 215, .88)!important;
    }
    body.theme-blackgold .event.active,
    body.theme-blackgold .roleItem.active{
      outline:2px solid rgba(212, 173, 107, .86)!important;
    }
    body.theme-midnight .danger{
      background:rgba(162,150,205,.10)!important;
      color:#cec5eb!important;
      border:1px solid rgba(206,197,235,.22)!important;
    }
    body.theme-midnight .cropPickedStatus{
      background:rgba(160,150,200,.10)!important;
      color:#d7d0ea!important;
      border:1px solid rgba(208,201,232,.20)!important;
    }
    body.theme-midnight .primary{
      background:linear-gradient(135deg,#6f6989,#948daf)!important;
      color:#fbf8ff!important;
      border:1px solid rgba(255,255,255,.08)!important;
    }
    body.theme-blackgold .danger{
      background:rgba(121,31,44,.18)!important;
      color:#d9808f!important;
      border:1px solid rgba(185,95,108,.36)!important;
    }
    body.theme-blackgold .cropPickedStatus{
      background:rgba(184,145,84,.12)!important;
      color:#e0bb80!important;
      border:1px solid rgba(212,173,107,.30)!important;
    }


    /* v0.38 Safari cover hairline fix */
    .hero.hasCover{
      border-color: transparent!important;
      box-shadow:none!important;
      background:transparent!important;
    }
    .hero.hasCover img.cover{
      opacity:1!important;
      border-radius:inherit!important;
      outline:1px solid transparent!important;
      box-shadow:none!important;
      clip-path: inset(0 round 28px)!important;
      -webkit-clip-path: inset(0 round 28px)!important;
      -webkit-mask-image: -webkit-radial-gradient(white, black)!important;
      transform:translateZ(0)!important;
      -webkit-transform:translateZ(0)!important;
      backface-visibility:hidden!important;
      -webkit-backface-visibility:hidden!important;
    }

  </style>
</head>
<body class="theme-sakura">
  <main class="app">
    <div class="topbar">
      <div>
        <div class="title">紀念日卡冊</div>
        <div class="sub">角色戀愛檔案・v0.44</div>
      </div>
      <div class="topActions">
        <button class="roleChip" id="chooseRoleBtn" title="切換角色">
          <span class="mini" id="currentRoleMini">♡</span>
          <span class="roleText" id="currentRoleText">角色</span>
        </button>
        <button class="pill" id="editRoleBtn">編輯</button>
      </div>
    </div>

    <section class="hero" id="hero">

      moonmist: {bg:"#eef1f8", panel:"#ffffff", panel2:"#dce2f1", text:"#273044", muted:"#6d7487", accent:"#8e9bd8", accent2:"#b9a5e8", border:"rgba(39,48,68,.12)"},
      sakura: {bg:"#fff4f7", panel:"#fffafd", panel2:"#ffe0e8", text:"#4b2e3b", muted:"#8b6877", accent:"#f2a1bd", accent2:"#d9a46f", border:"rgba(75,46,59,.12)"},
      blackgold: {bg:"#15100f", panel:"#211a18", panel2:"#362721", text:"#fff4e8", muted:"#bfae9e", accent:"#b21f3a", accent2:"#c69b52", border:"rgba(255,244,232,.12)"},
      milktea: {bg:"#f3eadf", panel:"#fffaf4", panel2:"#e6d4c2", text:"#46362d", muted:"#806f64", accent:"#c79b79", accent2:"#deb7a1", border:"rgba(70,54,45,.12)"},
      emerald: {bg:"#eef7f2", panel:"#ffffff", panel2:"#d9eee3", text:"#1f3b32", muted:"#668176", accent:"#62b98c", accent2:"#88a7d8", border:"rgba(31,59,50,.12)"}
    };
    function applyTheme(themeName){
      const key = THEME_STYLES[themeName] ? themeName : "sakura";
      const t = THEME_STYLES[key];
      document.body.className = "theme-" + key;
      document.documentElement.className = "theme-" + key;
      const targets = [document.documentElement, document.body];
      for(const el of targets){
        el.style.setProperty("--bg", t.bg);
        el.style.setProperty("--panel", t.panel);
        el.style.setProperty("--panel2", t.panel2);
        el.style.setProperty("--text", t.text);
        el.style.setProperty("--muted", t.muted);
        el.style.setProperty("--accent", t.accent);
        el.style.setProperty("--accent2", t.accent2);
        el.style.setProperty("--border", t.border);
        el.style.backgroundColor = t.bg;
        el.style.color = t.text;
      }
      const metaTheme = document.querySelector('meta[name="theme-color"]');
      if(metaTheme) metaTheme.setAttribute("content", t.bg);
    }



    function todayString(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }
    function defaultRole(i){

      return {
        id:i, userName:"主控", charName:`角色 ${String(i+1).padStart(2,"0")}`,
        userAvatar:"", charAvatar:"", cover:"",

        mainEvent:0,
        events:[
          {title:"初次相遇", date:today, icon:"♡", quote:""}

      }
    }
    function load(){
      try{
        const raw = localStorage.getItem(STORE_KEY);
        if(raw) return JSON.parse(raw);

      return {current:0, roles:Array.from({length:MAX},(_,i)=>defaultRole(i))}

    function save(){
      state.current = current;

        localStorage.setItem(STORE_KEY, JSON.stringify(state));

        alert("圖片或資料太大，瀏覽器存不下。請換較小圖片，或之後改成 IndexedDB 正式儲存版。");
      }
    }
    function parseLocalDate(dateStr){
      const [y,m,d] = dateStr.split("-").map(Number);
      return new Date(y, m - 1, d);
    }
    function localDateString(dateObj){
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, "0");
      const d = String(dateObj.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }
    function daysSince(dateStr){
      if(!dateStr) return 0;
      const start = parseLocalDate(dateStr);
      const today = new Date(); today.setHours(0,0,0,0);
      start.setHours(0,0,0,0);
      const diff = Math.floor((today - start)/(1000*60*60*24));
      return diff >= 0 ? diff + 1 : diff;
    }
    function fmt(dateStr){
      if(!dateStr) return "YYYY.MM.DD";
      return dateStr.replaceAll("-",".");
    }
    function setImgOrText(el, src, text){

    // v0.44 public-safe default cleanup

    function render(){

      const ev = role.events[role.mainEvent] || role.events[0] || {title:"在一起的日子", date:"2025-12-15", quote:""};

      const events = document.getElementById("events");

    function renderRoleList(){

    function applySafeInsetRect(sx, sy, sw, sh, strength = 0.002){
      const inset = Math.max(2.5, Math.min(sw, sh) * strength);
      if(sw > inset * 2 && sh > inset * 2){
        sx += inset;
        sy += inset;
        sw -= inset * 2;
        sh -= inset * 2;
      }
      return {sx, sy, sw, sh};
    }

    async function cropImageToDataURL(file, targetRatio, maxW, maxH, quality=0.84){
      if(!file) return "";
      const img = await new Promise((resolve, reject)=>{
        const image = new Image();
        image.onload = ()=>resolve(image);
        image.onerror = reject;
        image.src = URL.createObjectURL(file);
      });

      const srcW = img.naturalWidth || img.width;
      const srcH = img.naturalHeight || img.height;
      const srcRatio = srcW / srcH;
      let sx=0, sy=0, sw=srcW, sh=srcH;

      if(srcRatio > targetRatio){
        sw = srcH * targetRatio;
        sx = (srcW - sw) / 2;
      }else if(srcRatio < targetRatio){
        sh = srcW / targetRatio;
        sy = (srcH - sh) / 2;
      }

      let outW = maxW;
      let outH = Math.round(maxW / targetRatio);
      if(outH > maxH){
        outH = maxH;
        outW = Math.round(maxH * targetRatio);
      }

      const canvas = document.createElement("canvas");
      canvas.width = outW;
      canvas.height = outH;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ({sx, sy, sw, sh} = applySafeInsetRect(sx, sy, sw, sh, targetRatio === 4/5 ? 0.0045 : 0.0018));
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, outW, outH);
      URL.revokeObjectURL(img.src);
      return canvas.toDataURL("image/jpeg", quality);
    }

    
    function addDays(dateStr, days){
      const d = parseLocalDate(dateStr);
      d.setDate(d.getDate() + days);
      return localDateString(d);
    }
    function addYears(dateStr, years){
      const d = parseLocalDate(dateStr);
      d.setFullYear(d.getFullYear() + years);
      return localDateString(d);
    }
    function daysUntil(dateStr){
      const target = parseLocalDate(dateStr);
      const today = new Date(); today.setHours(0,0,0,0);
      target.setHours(0,0,0,0);
      return Math.ceil((target - today)/(1000*60*60*24));
    }
    function getUpcomingMilestones(startDate){
      if(!startDate) return [];
      const passed = Math.max(0, daysSince(startDate));
      const candidates = [];
      [100,200,300,400,500,600,700,800,900,1000].forEach(n=>{
        candidates.push({title:`${n}天`, date:addDays(startDate,n - 1), sort:n});
      });
      for(let y=1; y<=10; y++){
        candidates.push({title: y===1 ? "1周年" : `${y}周年`, date:addYears(startDate,y), sort:y*365.2425});
      }
      return candidates
        .filter(m => daysUntil(m.date) >= 0 && m.sort > passed)
        .sort((a,b)=> new Date(a.date) - new Date(b.date))
        .slice(0,3);
    }
    function renderMilestones(startDate){
      const wrap = document.getElementById("milestones");
      if(!wrap) return;
      const list = getUpcomingMilestones(startDate);
      wrap.innerHTML = "";
      list.forEach(m=>{
        const left = daysUntil(m.date);
        const item = document.createElement("div");
        item.className = "milestone";
        item.innerHTML = `
          <div class="milestoneIcon">💗</div>
          <div>
            <div class="milestoneTitle">${m.title}</div>
            <div class="milestoneDate">${m.date}</div>
          </div>
          <div class="milestoneBadge">D-${left}</div>`;
        wrap.appendChild(item);
      });
    }

      const ca = await cropImageToDataURL(charAvatarInput.files[0], 1, 320, 320, 0.86); if(ca) r.charAvatar = ca;

      save(); syncRoleImageUi(); roleDialog.close(); render();
    };

    const eventDialog = document.getElementById("eventDialog");

    function openEventDialog(i){
      editingEventIndex = i;
      const r = state.roles[current];

    document.getElementById("saveEventBtn").onclick = (ev)=>{

      };

      else r.events[editingEventIndex] = data;

    document.getElementById("deleteEventBtn").onclick = (ev)=>{

      }
      save(); eventDialog.close(); render();
    };



    function exportBackup(){
      const payload = {
        app: "角色紀念日卡冊",
        schemaVersion: 1,
        exportedAt: new Date().toISOString(),
        data: state
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const stamp = new Date().toISOString().slice(0,10).replaceAll("-","");
      a.href = url;
      a.download = `角色紀念日卡冊_備份_${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function normalizeImportedBackup(json){
      const data = json?.data || json;
      if(!data || !Array.isArray(data.roles)) throw new Error("備份格式不正確");
      const roles = data.roles.slice(0, MAX).map((role, i)=>({
        ...defaultRole(i),
        ...role,
        id: i,
        events: Array.isArray(role.events) && role.events.length ? role.events : defaultRole(i).events
      }));
      while(roles.length < MAX) roles.push(defaultRole(roles.length));
      return {
        current: Math.max(0, Math.min(Number(data.current || 0), MAX - 1)),
        roles
      };
    }

    function importBackupFile(file){
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        try{
          const imported = normalizeImportedBackup(JSON.parse(reader.result));
          const ok = confirm("匯入備份會覆蓋目前這台裝置上的角色資料。確定要匯入嗎？");
          if(!ok) return;
          state = imported;
          current = state.current || 0;
          save();
          render();
          roleDialog.close();
          alert("備份匯入完成。");
        }catch(err){
          alert("匯入失敗：這個 JSON 檔看起來不是有效的角色紀念日卡冊備份。");
        }finally{
          importBackupInput.value = "";
        }
      };
      reader.readAsText(file, "utf-8");
    }


    document.getElementById("exportBackupBtn").onclick = exportBackup;
    document.getElementById("importBackupBtn").onclick = ()=> importBackupInput.click();
    document.getElementById("importBackupInput").onchange = (ev)=> importBackupFile(ev.target.files[0]);


    let cropState = null;

    function openCropper(file, mode, onDone){
      if(!file) return;
      const ratio = mode === "cover" ? 4/5 : 1;
      document.getElementById("cropTitle").textContent = mode === "cover" ? "裁切紀念日主圖 4:5" : "裁切小頭像 1:1";
      const cropDialog = document.getElementById("cropDialog");
      const cropStage = document.getElementById("cropStage");
      const cropImg = document.getElementById("cropImg");
      const cropFrame = document.getElementById("cropFrame");
      const cropZoom = document.getElementById("cropZoom");
      cropFrame.classList.toggle("avatarFrame", mode !== "cover");

      const reader = new FileReader();
      reader.onload = ()=>{
        const img = new Image();
        img.onload = ()=>{
          cropImg.src = reader.result;
          cropState = {mode, ratio, img, onDone, naturalW:img.naturalWidth, naturalH:img.naturalHeight, scale:1, minScale:1, x:0, y:0, dragging:false};
          cropDialog.showModal();
          setTimeout(()=>{
            const sw = cropStage.clientWidth, sh = cropStage.clientHeight;
            let fw = sw * .82, fh = fw / ratio;
            if(fh > sh * .82){ fh = sh * .82; fw = fh * ratio; }
            cropFrame.style.width = fw + "px";
            cropFrame.style.height = fh + "px";
            cropState.minScale = Math.max(fw / cropState.naturalW, fh / cropState.naturalH);
            cropState.scale = cropState.minScale;
            cropState.x = (sw - cropState.naturalW * cropState.scale) / 2;
            cropState.y = (sh - cropState.naturalH * cropState.scale) / 2;
            cropZoom.value = "1";
            updateCropTransform();
          }, 40);
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    function updateCropTransform(){
      if(!cropState) return;
      const cropImg = document.getElementById("cropImg");
      cropImg.style.width = cropState.naturalW + "px";
      cropImg.style.height = cropState.naturalH + "px";
      cropImg.style.transform = `translate(${cropState.x}px, ${cropState.y}px) scale(${cropState.scale})`;
    }

    function clampCrop(){
      if(!cropState) return;
      const cropStage = document.getElementById("cropStage");
      const cropFrame = document.getElementById("cropFrame");
      const stage = cropStage.getBoundingClientRect();
      const frame = cropFrame.getBoundingClientRect();
      const fx = frame.left - stage.left, fy = frame.top - stage.top;
      const fw = frame.width, fh = frame.height;
      const iw = cropState.naturalW * cropState.scale, ih = cropState.naturalH * cropState.scale;
      cropState.x = Math.min(fx, Math.max(fx + fw - iw, cropState.x));
      cropState.y = Math.min(fy, Math.max(fy + fh - ih, cropState.y));
    }

    function cropToDataURL(){
      const cropStage = document.getElementById("cropStage");
      const cropFrame = document.getElementById("cropFrame");
      const stage = cropStage.getBoundingClientRect();
      const frame = cropFrame.getBoundingClientRect();
      const fx = frame.left - stage.left, fy = frame.top - stage.top;
      let sx = (fx - cropState.x) / cropState.scale;
      let sy = (fy - cropState.y) / cropState.scale;
      let sw = frame.width / cropState.scale;
      let sh = frame.height / cropState.scale;
      const outW = cropState.mode === "cover" ? 1200 : 512;
      const outH = cropState.mode === "cover" ? 1500 : 512;
      const canvas = document.createElement("canvas");
      canvas.width = outW; canvas.height = outH;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(cropState.img, sx, sy, sw, sh, 0, 0, outW, outH);
      return canvas.toDataURL("image/jpeg", cropState.mode === "cover" ? .86 : .88);
    }

    function bindCropperOnce(){
      const cropDialog = document.getElementById("cropDialog");
      const cropStage = document.getElementById("cropStage");
      const cropZoom = document.getElementById("cropZoom");

      const closeCrop = ()=>{ if(cropDialog.open) cropDialog.close(); cropState = null; };
      document.getElementById("cropCloseBtn").onclick = closeCrop;
      document.getElementById("cropCancelBtn").onclick = closeCrop;
      document.getElementById("cropApplyBtn").onclick = ()=>{
        if(!cropState) return;
        const done = cropState.onDone;
        const data = cropToDataURL();
        cropDialog.close();
        cropState = null;
        done(data);
      };

      cropZoom.oninput = ()=>{
        if(!cropState) return;
        const oldScale = cropState.scale;
        const newScale = cropState.minScale * Number(cropZoom.value);
        const stage = cropStage.getBoundingClientRect();
        const cx = stage.width / 2, cy = stage.height / 2;
        cropState.x = cx - (cx - cropState.x) * (newScale / oldScale);
        cropState.y = cy - (cy - cropState.y) * (newScale / oldScale);
        cropState.scale = newScale;
        clampCrop();
        updateCropTransform();
      };

      cropStage.addEventListener("pointerdown", ev=>{
        if(!cropState) return;
        cropState.dragging = true;
        cropState.startX = ev.clientX; cropState.startY = ev.clientY;
        cropState.baseX = cropState.x; cropState.baseY = cropState.y;
        cropStage.setPointerCapture?.(ev.pointerId);
      });
      cropStage.addEventListener("pointermove", ev=>{
        if(!cropState || !cropState.dragging) return;
        cropState.x = cropState.baseX + ev.clientX - cropState.startX;
        cropState.y = cropState.baseY + ev.clientY - cropState.startY;
        clampCrop();
        updateCropTransform();
      });
      cropStage.addEventListener("pointerup", ()=>{ if(cropState) cropState.dragging = false; });
      cropStage.addEventListener("pointercancel", ()=>{ if(cropState) cropState.dragging = false; });
    }

    bindCropperOnce();

    // v0.34: crop status + delete button sync helpers
    function ensureCropPickedStatus(){
      const map = [
        ["charAvatarInput","deleteCharAvatarBtn"],
        ["userAvatarInput","deleteUserAvatarBtn"],
        ["coverInput","deleteCoverBtn"]
      ];
      map.forEach(([id, delId])=>{
        const input = document.getElementById(id);
        if(!input) return;
        if(!document.getElementById(id+"Status")){
          const span = document.createElement("span");
          span.id = id + "Status";
          span.className = "cropPickedStatus";
          span.textContent = "已套用裁切";
          const btn = delId ? document.getElementById(delId) : null;
          if(btn) btn.insertAdjacentElement("afterend", span);
          else input.insertAdjacentElement("afterend", span);
        }
      });
    }

    function setCropPickedStatus(inputId, show){
      ensureCropPickedStatus();
      const el = document.getElementById(inputId+"Status");
      if(!el) return;
      el.classList.toggle("show", !!show);
    }

    function syncRoleImageUi(){
      ensureCropPickedStatus();
      const r = state.roles[current] || {};
      const hasChar = !!r.charAvatar;
      const hasUser = !!r.userAvatar;
      const hasCover = !!r.cover;
      const charBtn = document.getElementById("deleteCharAvatarBtn");
      const userBtn = document.getElementById("deleteUserAvatarBtn");
      const coverBtn = document.getElementById("deleteCoverBtn");
      if(charBtn) charBtn.disabled = !hasChar;
      if(userBtn) userBtn.disabled = !hasUser;
      if(coverBtn) coverBtn.disabled = !hasCover;
      setCropPickedStatus("charAvatarInput", hasChar);
      setCropPickedStatus("userAvatarInput", hasUser);
      setCropPickedStatus("coverInput", hasCover);
    }

    window.addEventListener("load", ()=>{ ensureCropPickedStatus(); syncRoleImageUi(); });
    setTimeout(()=>{ ensureCropPickedStatus(); syncRoleImageUi(); }, 300);


    // v0.33 robust cropper override
    (function(){
      function getEl(id){ return document.getElementById(id); }

      let cropStateV30 = null;

      function ensureCropDialogV30(){
        if(getEl("cropDialog")) return;
        const dlg = document.createElement("dialog");
        dlg.className = "cropDialog";
        dlg.id = "cropDialog";
        dlg.innerHTML = `

      function openCropperV30(file, mode, onDone){
        ensureCropDialogV30();
        if(!file) return;
        const ratio = mode === "cover" ? 4/5 : 1;
        const cropDialog = getEl("cropDialog");
        const cropStage = getEl("cropStage");
        const cropImg = getEl("cropImg");
        const cropFrame = getEl("cropFrame");
        const cropZoom = getEl("cropZoom");
        getEl("cropTitle").textContent = mode === "cover" ? "裁切紀念日主圖 4:5" : "裁切小頭像 1:1";
        cropFrame.classList.toggle("avatarFrame", mode !== "cover");

        const reader = new FileReader();
        reader.onload = ()=>{
          const img = new Image();
          img.onload = ()=>{
            cropImg.src = reader.result;
            cropStateV30 = {
              mode, ratio, img, onDone,
              naturalW:img.naturalWidth, naturalH:img.naturalHeight,
              minScale:1, scale:1, x:0, y:0,
              dragging:false, startX:0, startY:0, baseX:0, baseY:0
            };
            if(typeof cropDialog.showModal === "function") cropDialog.showModal();
            else cropDialog.setAttribute("open", "open");
            setTimeout(()=>{

              cropStateV30.y = (sh - cropStateV30.naturalH * cropStateV30.scale) / 2;
              cropZoom.value = "1";
              updateCropV30();
            }, 60);
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      }

      function updateCropV30(){
        if(!cropStateV30) return;
        const cropImg = getEl("cropImg");
        cropImg.style.width = cropStateV30.naturalW + "px";
        cropImg.style.height = cropStateV30.naturalH + "px";
        cropImg.style.transform = `translate(${cropStateV30.x}px, ${cropStateV30.y}px) scale(${cropStateV30.scale})`;
      }

      function clampCropV30(){
        if(!cropStateV30) return;
        const cropStage = getEl("cropStage");
        const cropFrame = getEl("cropFrame");
        const stage = cropStage.getBoundingClientRect();
        const frame = cropFrame.getBoundingClientRect();
        const fx = frame.left - stage.left, fy = frame.top - stage.top;
        const fw = frame.width, fh = frame.height;
        const iw = cropStateV30.naturalW * cropStateV30.scale;
        const ih = cropStateV30.naturalH * cropStateV30.scale;
        cropStateV30.x = Math.min(fx, Math.max(fx + fw - iw, cropStateV30.x));
        cropStateV30.y = Math.min(fy, Math.max(fy + fh - ih, cropStateV30.y));
      }

      function cropToDataURLV30(){
        const cropStage = getEl("cropStage");
        const cropFrame = getEl("cropFrame");
        const stage = cropStage.getBoundingClientRect();
        const frame = cropFrame.getBoundingClientRect();
        const fx = frame.left - stage.left, fy = frame.top - stage.top;
        let sx = Math.max(0, (fx - cropStateV30.x) / cropStateV30.scale);
        let sy = Math.max(0, (fy - cropStateV30.y) / cropStateV30.scale);
        let sw = frame.width / cropStateV30.scale;
        let sh = frame.height / cropStateV30.scale;
        const outW = cropStateV30.mode === "cover" ? 1200 : 512;
        const outH = cropStateV30.mode === "cover" ? 1500 : 512;
        const canvas = document.createElement("canvas");
        canvas.width = outW; canvas.height = outH;
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ({sx, sy, sw, sh} = applySafeInsetRect(sx, sy, sw, sh, cropStateV30.mode === "cover" ? 0.0045 : 0.0018));
        ctx.drawImage(cropStateV30.img, sx, sy, sw, sh, 0, 0, outW, outH);
        return canvas.toDataURL("image/jpeg", cropStateV30.mode === "cover" ? .86 : .88);
      }

      function bindCropperV30(){
        ensureCropDialogV30();
        const cropDialog = getEl("cropDialog");
        const cropStage = getEl("cropStage");
        const cropZoom = getEl("cropZoom");

        const close = ()=>{
          if(cropDialog.open && typeof cropDialog.close === "function") cropDialog.close();
          else cropDialog.removeAttribute("open");
          cropStateV30 = null;
        };
        getEl("cropCloseBtn").onclick = close;
        getEl("cropCancelBtn").onclick = close;
        getEl("cropApplyBtn").onclick = ()=>{
          if(!cropStateV30) return;
          const cb = cropStateV30.onDone;
          const data = cropToDataURLV30();
          close();
          cb(data);
        };

        cropZoom.oninput = ()=>{
          if(!cropStateV30) return;
          const oldScale = cropStateV30.scale;
          const newScale = cropStateV30.minScale * Number(cropZoom.value);
          const stage = cropStage.getBoundingClientRect();
          const cx = stage.width / 2, cy = stage.height / 2;
          cropStateV30.x = cx - (cx - cropStateV30.x) * (newScale / oldScale);
          cropStateV30.y = cy - (cy - cropStateV30.y) * (newScale / oldScale);
          cropStateV30.scale = newScale;
          clampCropV30();
          updateCropV30();
        };

        const start = (x,y)=>{
          if(!cropStateV30) return;
          cropStateV30.dragging = true;
          cropStateV30.startX = x; cropStateV30.startY = y;
          cropStateV30.baseX = cropStateV30.x; cropStateV30.baseY = cropStateV30.y;
        };
        const move = (x,y)=>{
          if(!cropStateV30 || !cropStateV30.dragging) return;
          cropStateV30.x = cropStateV30.baseX + x - cropStateV30.startX;
          cropStateV30.y = cropStateV30.baseY + y - cropStateV30.startY;
          clampCropV30();
          updateCropV30();
        };
        const end = ()=>{ if(cropStateV30) cropStateV30.dragging = false; };

        cropStage.onpointerdown = (ev)=>{ start(ev.clientX, ev.clientY); cropStage.setPointerCapture?.(ev.pointerId); };
        cropStage.onpointermove = (ev)=> move(ev.clientX, ev.clientY);
        cropStage.onpointerup = end;
        cropStage.onpointercancel = end;

        cropStage.ontouchstart = (ev)=>{ const t=ev.touches[0]; start(t.clientX,t.clientY); ev.preventDefault(); };
        cropStage.ontouchmove = (ev)=>{ const t=ev.touches[0]; move(t.clientX,t.clientY); ev.preventDefault(); };
        cropStage.ontouchend = end;
      }
