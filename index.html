<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <meta name="color-scheme" content="light only">
  <meta name="theme-color" content="#fff4f7" />
  <link rel="manifest" href="manifest.webmanifest">
  <title>角色紀念日卡冊 v0.26</title>
  <style>
    :root{
      color-scheme: light only;
      --bg:#fff4f7; --panel:#fffafd; --panel2:#ffe0e8; --text:#4b2e3b; --muted:#8b6877;
      --accent:#e9a7c6; --accent2:#8b7cf6; --border:rgba(255,255,255,.12);
      --cardShadow: 0 18px 48px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html{background:var(--bg); color-scheme:light}
    body{
      margin:0; font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background-color:var(--bg);
      background-image:radial-gradient(circle at top, rgba(255,255,255,0.10) 18%, transparent 38%);
      background-image:radial-gradient(circle at top, color-mix(in srgb, var(--accent) 18%, transparent), transparent 38%);
      color:var(--text); min-height:100svh;
      color-scheme:light only;
    }
    button,input,select{font:inherit}
    .app{
      max-width:460px; margin:0 auto; min-height:100svh;
      padding:calc(18px + env(safe-area-inset-top, 0px)) 18px calc(28px + env(safe-area-inset-bottom, 0px));
    }
    .topbar{display:flex; align-items:center; justify-content:space-between; margin:8px 0 18px; gap:12px;}
    .title{font-size:24px; font-weight:800; letter-spacing:.04em}
    .sub{color:var(--muted); font-size:13px; margin-top:3px}
    .topActions{display:flex; gap:8px; align-items:center}
    .pill{
      border:1px solid var(--border); background:color-mix(in srgb, var(--panel) 72%, transparent); color:var(--text);
      padding:9px 12px; border-radius:999px; cursor:pointer; white-space:nowrap;
    }
    .pill:hover{background:rgba(255,255,255,.1)}
    .roleChip{
      display:inline-flex; align-items:center; gap:8px; max-width:160px;
      border:1px solid var(--border); background:color-mix(in srgb, var(--panel) 72%, transparent); color:var(--text);
      padding:8px 10px; border-radius:999px; cursor:pointer;
    }
    .roleChip .mini{
      width:28px;height:28px;border-radius:50%; object-fit:cover; background:var(--panel2);
      display:grid; place-items:center; overflow:hidden; flex:0 0 auto; font-size:13px;
    }
    .roleChip .roleText{overflow:hidden; white-space:nowrap; text-overflow:ellipsis; font-size:13px; font-weight:700}

    .hero{
      position:relative; border-radius:28px; overflow:hidden; aspect-ratio:4/5; background:linear-gradient(160deg,var(--panel2),var(--panel));
      box-shadow:var(--cardShadow); border:1px solid var(--border);
    }
    .heroScroll{
      position:absolute; inset:0; z-index:5; overflow-y:auto; overflow-x:hidden;
      height:100%;
      scrollbar-width:none;
      -ms-overflow-style:none;
      overscroll-behavior:contain;
    }
    .heroScroll::-webkit-scrollbar{display:none}
    .heroFlow{
      height:100%;
      min-height:100%;
    }
    .heroPaneTop{
      height:100%;
      min-height:100%;
      position:relative;
      text-align:center;
    }
    .heroPaneFuture{
      min-height:185px;
      padding:10px 18px 26px;
    }
    .hero img.cover{
      width:100%;height:100%;object-fit:cover; display:block; opacity:.92;
      position:absolute; inset:0; z-index:1;
    }
    .emptyCover{
      z-index:1;
      position:absolute; inset:0; display:grid; place-items:center; text-align:center; padding:28px; color:var(--muted);
      background:var(--panel2);
      background:
        radial-gradient(circle at 20% 18%, color-mix(in srgb,var(--accent) 24%,transparent), transparent 20%),
        radial-gradient(circle at 80% 28%, color-mix(in srgb,var(--accent2) 20%,transparent), transparent 18%),
        linear-gradient(155deg, color-mix(in srgb,var(--panel2) 78%,var(--accent)), var(--panel));
    }
    .emptyHeart{font-size:42px; color:color-mix(in srgb,var(--accent) 55%,var(--muted)); opacity:.9}
    .doodles{position:absolute; inset:0; pointer-events:none; opacity:.85; z-index:2}
    .doodles span{position:absolute; color:color-mix(in srgb,var(--accent) 78%,white); font-size:28px; opacity:.75}
    .doodles span:nth-child(1){left:12%;top:10%;transform:rotate(-12deg)}
    .doodles span:nth-child(2){right:15%;top:12%;transform:rotate(14deg)}
    .doodles span:nth-child(3){left:9%;bottom:28%;transform:rotate(10deg)}
    .doodles span:nth-child(4){right:10%;bottom:35%;transform:rotate(-10deg)}
    .overlay{
      position:absolute;
      left:18px;
      right:18px;
      width:auto;
      text-align:center;
      background:transparent;
      z-index:30;
      pointer-events:none;
      display:block;
      transform:translateY(-50%);
      top:78%;
    }
    .hero.hasCover .overlay{ top:82%; }
    .hero.noCover .overlay{ top:80%; }
    .hero.hasCover .doodles{display:none}
    .hero.hasCover .overlay{background:transparent}
    .hero.noCover .overlay{background:transparent}
    .avatars{display:flex; align-items:center; justify-content:center; gap:0; margin-bottom:8px}
    .avatar{
      width:44px;height:44px;border-radius:50%; border:2px solid rgba(255,255,255,.72);
      background:var(--panel); object-fit:cover; display:grid; place-items:center; overflow:hidden;
      box-shadow:0 4px 14px rgba(0,0,0,.22);
      position:relative;
    }
    .avatar + .avatar{margin-left:-2px}
    #charAvatar{z-index:2}
    #userAvatar{z-index:1}
    .avatarNote{display:none!important}
    .label{font-size:15px; font-weight:800; text-shadow:0 2px 14px rgba(0,0,0,.55); margin-top:0; line-height:1.16}
    .days{
      font-family:"Great Vibes","Snell Roundhand","Savoye LET","Zapfino","Apple Chancery","Segoe Script",cursive;
      font-size:32px; font-weight:400; letter-spacing:.01em;
      line-height:1.10; margin-top:1px;
    }
    .since{
      font-family:"Great Vibes","Snell Roundhand","Savoye LET","Zapfino","Apple Chancery","Segoe Script",cursive;
      font-size:17px; font-weight:400; margin-top:0; line-height:1.10;
    }
    .quote{font-size:12px; color:rgba(255,255,255,.82); margin-top:3px; line-height:1.25}

    .panel{margin-top:18px; border:1px solid var(--border); border-radius:24px; background:color-mix(in srgb, var(--panel) 86%, transparent); padding:14px}
    .sectionHead{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}
    .sectionHead h2{font-size:18px; margin:0}
    .events{display:grid; gap:10px}
    .event{display:flex; align-items:center; gap:12px; padding:12px; border:1px solid var(--border); border-radius:18px; background:color-mix(in srgb, var(--panel2) 62%, transparent); cursor:pointer}
    .event.active{outline:2px solid color-mix(in srgb,var(--accent) 68%,white)}
    .icon{width:42px;height:42px;border-radius:50%; display:grid; place-items:center; background:rgba(255,255,255,.08); font-size:20px}
    .eventTitle{font-weight:800}
    .eventDate{color:var(--muted); font-size:13px; margin-top:3px}
    .eventDays{margin-left:auto; font-family:Georgia,serif; font-weight:900; font-style:italic}

    dialog{border:1px solid var(--border); border-radius:24px; background:var(--panel); color:var(--text); width:min(430px,92vw); padding:0; box-shadow:0 25px 80px rgba(0,0,0,.55)}
    dialog::backdrop{background:rgba(0,0,0,.56)}
    .modal{padding:18px}
    .modal h3{margin:0 0 12px; font-size:20px}
    .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    label{display:block; font-size:12px; color:var(--muted); margin:10px 0 5px}
    input,select{
      width:100%; border:1px solid var(--border); background:var(--panel2); color:var(--text);
      border-radius:14px; padding:11px 12px; outline:none;
      color-scheme: light only;
    }
    option{background:var(--panel); color:var(--text)}
    input[type="file"]{font-size:12px; padding:9px}
    .fileRow{display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center}
    .actions{display:flex; gap:10px; justify-content:flex-end; margin-top:16px}
    .primary{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; border:0}
    .ghost{background:rgba(255,255,255,.06); color:var(--text); border:1px solid var(--border)}
    .danger{background:rgba(255,75,96,.12); color:#ffb4bf; border:1px solid rgba(255,75,96,.25)}
    .smallBtn{padding:8px 10px; border-radius:14px; cursor:pointer}
    .hidden{display:none!important}
    .hint{font-size:12px; color:var(--muted); line-height:1.55; margin-top:10px}
    .backupBox{
      margin-top:14px; padding:12px; border:1px solid var(--border);
      border-radius:18px; background:rgba(255,255,255,.045);
    }
    .backupTitle{font-size:13px; font-weight:800; margin-bottom:8px}
    .backupActions{display:grid; grid-template-columns:1fr 1fr; gap:8px}
    .backupNote{font-size:11px; color:var(--muted); line-height:1.45; margin-top:8px}
    .roleList{display:grid; gap:10px; max-height:65svh; overflow:auto; padding-right:2px}
    .roleItem{
      display:flex; align-items:center; gap:12px; padding:12px; border:1px solid var(--border);
      border-radius:18px; background:rgba(255,255,255,.055); cursor:pointer; color:var(--text);
    }
    .roleItem.active{outline:2px solid color-mix(in srgb,var(--accent) 68%,white)}
    .roleItem .mini{width:42px;height:42px;border-radius:50%; display:grid; place-items:center; background:var(--panel2); overflow:hidden; flex:0 0 auto}
    .roleItem img{width:100%;height:100%;object-fit:cover}
    .roleMain{font-weight:800}
    .roleSub{font-size:12px;color:var(--muted);margin-top:3px}
    .milestoneStage{
      border-radius:20px;
      padding:8px 10px 0;
      background:transparent;
    }
    .milestoneWrap{
      padding:0 2px 6px;
    }
    .milestones{display:grid; gap:10px}
    .milestone{
      display:flex; align-items:center; gap:10px;
      padding:2px 0;
      color:#fff;
      text-shadow:0 2px 8px rgba(0,0,0,.62), 0 0 18px rgba(0,0,0,.38);
    }
    .milestoneIcon{
      width:22px;height:22px;border-radius:50%;display:grid;place-items:center;
      background:rgba(255,255,255,.13); border:1px solid rgba(255,255,255,.16);
      flex:0 0 auto; font-size:11px;
    }
    .milestoneTitle{font-size:14px;font-weight:900; line-height:1}
    .milestoneDate{font-size:11px;opacity:.92;margin-top:2px;letter-spacing:.02em}
    .milestoneBadge{
      margin-left:auto;background:rgba(0,0,0,.30);color:#fff;border-radius:999px;
      padding:5px 9px;font-weight:800;min-width:52px;text-align:center;font-size:11px;
    }
    .hero:not(.hasCover) .milestone{color:var(--text); text-shadow:none}
    .hero:not(.hasCover) .milestoneBadge{background:rgba(255,255,255,.10); color:var(--text)}
.footer{display:none!important}


    .hero.hasCover .overlay,
    .hero.hasCover .overlay *{
      opacity:1!important;
      visibility:visible!important;
    }
    .hero.hasCover .label,
    .hero.hasCover .days,
    .hero.hasCover .since,
    .hero.hasCover .quote{
      color:#fff!important;
      text-shadow:0 2px 8px rgba(0,0,0,.70), 0 0 18px rgba(0,0,0,.42)!important;
    }

    .overlay > *{
      position:relative;
      z-index:31;
      opacity:1!important;
      visibility:visible!important;
    }
    .hero.hasCover .overlay{
      background:transparent!important;
    }
    .hero.hasCover .overlay > *{
      display:block;
    }
    .hero.hasCover .avatars{
      display:flex!important;
    }

    .hero.noCover .label,
    .hero.noCover .days,
    .hero.noCover .since,
    .hero.noCover .quote{
      color:var(--text)!important;
      text-shadow:none!important;
    }

    @supports not (color: color-mix(in srgb, white 50%, black)) {
      body{
        background-image:radial-gradient(circle at top, rgba(255,255,255,0.10) 18%, transparent 38%)!important;
      }
      .emptyCover{
        background:var(--panel2)!important;
      }
      .panel{
        background:var(--panel)!important;
      }
      .event{
        background:var(--panel2)!important;
      }
      .roleChip,.pill{
        background:var(--panel)!important;
      }
    }

    html.theme-midnight, body.theme-midnight{--bg:#15151b;--panel:#222129;--panel2:#2c2a35;--text:#f7f2f8;--muted:#aaa2b4;--accent:#e9a7c6;--accent2:#8b7cf6}
    html.theme-moonmist, body.theme-moonmist{--bg:#eef1f8;--panel:#ffffff;--panel2:#dce2f1;--text:#273044;--muted:#6d7487;--accent:#8e9bd8;--accent2:#b9a5e8}
    html.theme-sakura, body.theme-sakura{--bg:#fff4f7;--panel:#fffafd;--panel2:#ffe0e8;--text:#4b2e3b;--muted:#8b6877;--accent:#f2a1bd;--accent2:#d9a46f}
    html.theme-blackgold, body.theme-blackgold{--bg:#15100f;--panel:#211a18;--panel2:#362721;--text:#fff4e8;--muted:#bfae9e;--accent:#b21f3a;--accent2:#c69b52}
    html.theme-milktea, body.theme-milktea{--bg:#f3eadf;--panel:#fffaf4;--panel2:#e6d4c2;--text:#46362d;--muted:#806f64;--accent:#c79b79;--accent2:#deb7a1}
    html.theme-emerald, body.theme-emerald{--bg:#eef7f2;--panel:#ffffff;--panel2:#d9eee3;--text:#1f3b32;--muted:#668176;--accent:#62b98c;--accent2:#88a7d8}
  
    /* v0.25 image-theme workaround:
       iOS/Safari on this device darkens CSS colors but does not darken real images,
       so light theme surfaces use tiny PNG image backgrounds. */
    html, body{
      background-color:transparent!important;
      background-image:var(--bg-img)!important;
      background-repeat:repeat!important;
      color:var(--text)!important;
      color-scheme:light only!important;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-1;
      background-image:var(--bg-img)!important;
      background-repeat:repeat!important;
      pointer-events:none;
    }
    .panel,
    dialog,
    .backupBox{
      background-color:transparent!important;
      background-image:var(--panel-img)!important;
      background-repeat:repeat!important;
      color:var(--text)!important;
      border-color:var(--border)!important;
    }
    .event,
    .emptyCover,
    input,
    select,
    textarea,
    .roleChip,
    .pill,
    .smallBtn.ghost{
      background-color:transparent!important;
      background-image:var(--panel2-img)!important;
      background-repeat:repeat!important;
      color:var(--text)!important;
      border-color:var(--border)!important;
    }
    .hero{
      background-color:transparent!important;
      background-image:var(--hero-img)!important;
      background-repeat:repeat!important;
      border-color:var(--border)!important;
    }
    .primary{
      background-image:none!important;
      background-color:var(--accent)!important;
      color:#fff!important;
    }

  
    /* v0.26: readable light themes after iOS CSS darkening workaround */
    body.theme-sakura,
    body.theme-moonmist,
    body.theme-milktea,
    body.theme-emerald{
      color:var(--text)!important;
      text-shadow:none!important;
    }
    body.theme-sakura h1,
    body.theme-moonmist h1,
    body.theme-milktea h1,
    body.theme-emerald h1,
    body.theme-sakura .roleTitle,
    body.theme-moonmist .roleTitle,
    body.theme-milktea .roleTitle,
    body.theme-emerald .roleTitle,
    body.theme-sakura .event b,
    body.theme-moonmist .event b,
    body.theme-milktea .event b,
    body.theme-emerald .event b,
    body.theme-sakura .overlay .days,
    body.theme-moonmist .overlay .days,
    body.theme-milktea .overlay .days,
    body.theme-emerald .overlay .days{
      color:var(--text)!important;
      opacity:1!important;
      text-shadow:none!important;
      font-weight:900!important;
    }
    body.theme-sakura .sub,
    body.theme-sakura .hint,
    body.theme-sakura .label,
    body.theme-sakura .since,
    body.theme-sakura .quote,
    body.theme-sakura .event small,
    body.theme-sakura .backupNote,
    body.theme-moonmist .sub,
    body.theme-moonmist .hint,
    body.theme-moonmist .label,
    body.theme-moonmist .since,
    body.theme-moonmist .quote,
    body.theme-moonmist .event small,
    body.theme-moonmist .backupNote,
    body.theme-milktea .sub,
    body.theme-milktea .hint,
    body.theme-milktea .label,
    body.theme-milktea .since,
    body.theme-milktea .quote,
    body.theme-milktea .event small,
    body.theme-milktea .backupNote,
    body.theme-emerald .sub,
    body.theme-emerald .hint,
    body.theme-emerald .label,
    body.theme-emerald .since,
    body.theme-emerald .quote,
    body.theme-emerald .event small,
    body.theme-emerald .backupNote{
      color:var(--muted)!important;
      opacity:1!important;
      text-shadow:none!important;
    }
    body.theme-sakura .avatar,
    body.theme-moonmist .avatar,
    body.theme-milktea .avatar,
    body.theme-emerald .avatar{
      background:var(--accent)!important;
      color:#fff!important;
      border-color:rgba(0,0,0,.20)!important;
      box-shadow:0 8px 22px rgba(0,0,0,.12)!important;
    }
    body.theme-sakura .primary,
    body.theme-moonmist .primary,
    body.theme-milktea .primary,
    body.theme-emerald .primary{
      color:#fff!important;
      box-shadow:0 10px 26px rgba(0,0,0,.12)!important;
    }
    body.theme-sakura .doodles,
    body.theme-moonmist .doodles,
    body.theme-milktea .doodles,
    body.theme-emerald .doodles{
      opacity:.55!important;
    }

  </style>
</head>
<body class="theme-sakura">
  <main class="app">
    <div class="topbar">
      <div>
        <div class="title">紀念日卡冊</div>
        <div class="sub">角色戀愛檔案・v0.26 contrast</div>
      </div>
      <div class="topActions">
        <button class="roleChip" id="chooseRoleBtn" title="切換角色">
          <span class="mini" id="currentRoleMini">♡</span>
          <span class="roleText" id="currentRoleText">角色</span>
        </button>
        <button class="pill" id="editRoleBtn">編輯</button>
      </div>
    </div>

    <section class="hero" id="hero">
      <div class="emptyCover" id="emptyCover">
        <div aria-hidden="true" class="emptyHeart">♡</div>
      </div>
      <img class="cover hidden" id="coverImg" alt="紀念日圖">
      <div class="doodles"><span>♡</span><span>☾</span><span>✦</span><span>♡</span></div>
      <div class="heroScroll" id="heroScroll" aria-label="主卡滑動區">
        <div class="heroFlow">
          <div class="heroPaneTop">
            <div class="overlay">
              <div class="avatars">
                <div class="avatar" id="charAvatar">他</div>
                <div class="avatar" id="userAvatar">妳</div>
              </div>
              <div class="avatarNote" id="avatarNote">角色 × 主控</div>
              <div class="label" id="mainLabel">在一起的日子</div>
              <div class="days" id="mainDays">+0 Days</div>
              <div class="since" id="mainSince">since 2025.12.15</div>
              <div class="quote" id="mainQuote">從那天起，世界多了一個只屬於你們的日期。</div>
            </div>
          </div>
          <div class="heroPaneFuture">
            <div class="milestoneStage">
              <div class="milestoneWrap">
                <div class="milestones" id="milestones"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="sectionHead">
        <h2 id="roleName">角色 01</h2>
        <button class="pill" id="addEventBtn">＋新增日期</button>
      </div>
      <div class="events" id="events"></div>
    </section>

    
  </main>

  <dialog id="rolePickerDialog">
    <div class="modal">
      <h3>切換角色</h3>
      <div class="roleList" id="roleList"></div>
      <div class="actions">
        <button class="smallBtn ghost" onclick="rolePickerDialog.close()">關閉</button>
      </div>
    </div>
  </dialog>

  <dialog id="roleDialog">
    <form method="dialog" class="modal" id="roleForm">
      <h3>編輯角色卡</h3>
      <div class="grid">
        <div><label>角色名稱</label><input id="charNameInput" placeholder="凌辰"></div>
        <div><label>主控名稱</label><input id="userNameInput" placeholder="Miya / 恩雅"></div>
      </div>
      <label>角色小頭像</label><input type="file" accept="image/*" id="charAvatarInput">
      <label>主控小頭像</label><input type="file" accept="image/*" id="userAvatarInput">
      <label>中間紀念日圖</label><div class="fileRow"><input type="file" accept="image/*" id="coverInput"><button class="smallBtn danger" type="button" id="deleteCoverBtn">刪除圖片</button></div>
      <div class="hint">這版會自動把主圖置中裁切為 4:5，並壓縮到適合瀏覽器儲存的大小。小頭像會裁切成正方形。</div>
      <label>主題底色 / 邊框感</label>
      <select id="themeInput">
        <option value="midnight">深夜暗幕・戀人微光</option>
        <option value="moonmist">月霧藍紫・清冷微光</option>
        <option value="sakura">櫻花粉白・甜夢柔光</option>

    function applyTheme(themeName){
      const key = IMAGE_THEMES[themeName] ? themeName : "sakura";
      const t = IMAGE_THEMES[key];
      document.body.className = "theme-" + key;
      document.documentElement.className = "theme-" + key;
      for(const el of [document.documentElement, document.body]){
        el.style.setProperty("--bg-img", t.bg);
        el.style.setProperty("--panel-img", t.panel);
        el.style.setProperty("--panel2-img", t.panel2);
        el.style.setProperty("--hero-img", t.hero);
        el.style.setProperty("--text", t.text);
        el.style.setProperty("--muted", t.muted);
        el.style.setProperty("--accent", t.accent);
        el.style.setProperty("--accent2", t.accent2);
        el.style.setProperty("--border", t.border);
        el.style.setProperty("--bg", "transparent");
        el.style.setProperty("--panel", "transparent");
        el.style.setProperty("--panel2", "transparent");
        el.style.backgroundImage = t.bg;
        el.style.backgroundRepeat = "repeat";
        el.style.backgroundColor = "transparent";
        el.style.color = t.text;
      }
      const metaTheme = document.querySelector('meta[name="theme-color"]');
      if(metaTheme) metaTheme.setAttribute("content", key === "midnight" || key === "blackgold" ? "#15151b" : "#fff4f7");
    }



    function todayString(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }
    function defaultRole(i){
      const today = todayString();
      return {
        id:i, userName:"主控", charName:`角色 ${String(i+1).padStart(2,"0")}`,
        userAvatar:"", charAvatar:"", cover:"",
        theme:"sakura",
        mainEvent:0,
        events:[
          {title:"初次相遇", date:today, icon:"♡", quote:"故事從這一天開始。"}
        ]
      }
    }
    function load(){
      try{
        const raw = localStorage.getItem(STORE_KEY);
        if(raw) return JSON.parse(raw);
      }catch(e){}
      return {current:0, roles:Array.from({length:MAX},(_,i)=>defaultRole(i))}
    }
    function save(){
      state.current = current;
      try{
        localStorage.setItem(STORE_KEY, JSON.stringify(state));
      }catch(e){
        alert("圖片或資料太大，瀏覽器存不下。請換較小圖片，或之後改成 IndexedDB 正式儲存版。");
      }
    }
    function parseLocalDate(dateStr){
      const [y,m,d] = dateStr.split("-").map(Number);
      return new Date(y, m - 1, d);
    }
    function localDateString(dateObj){
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, "0");
      const d = String(dateObj.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }
    function daysSince(dateStr){
      if(!dateStr) return 0;
      const start = parseLocalDate(dateStr);
      const today = new Date(); today.setHours(0,0,0,0);
      start.setHours(0,0,0,0);
      const diff = Math.floor((today - start)/(1000*60*60*24));
      return diff >= 0 ? diff + 1 : diff;
    }
    function fmt(dateStr){
      if(!dateStr) return "YYYY.MM.DD";
      return dateStr.replaceAll("-",".");
    }
    function setImgOrText(el, src, text){
      el.innerHTML = "";
      if(src){
        const img = document.createElement("img");
        img.src = src; img.style.width="100%"; img.style.height="100%"; img.style.objectFit="cover";
        el.appendChild(img);
      }else{
        el.textContent = text;
      }
    }

    function resetHeroScroll(){
      const heroScroll = document.getElementById("heroScroll");
      if(!heroScroll) return;
      heroScroll.scrollTop = 0;
      requestAnimationFrame(()=>{ heroScroll.scrollTop = 0; });
      setTimeout(()=>{ heroScroll.scrollTop = 0; }, 60);
    }

    function render(){
      const role = state.roles[current];
      applyTheme(role.theme || "sakura");

      const mini = document.getElementById("currentRoleMini");
      setImgOrText(mini, role.charAvatar, "♡");
      document.getElementById("currentRoleText").textContent = role.charName || `角色 ${current+1}`;

      document.getElementById("roleName").textContent = `${role.charName || "角色"} × ${role.userName || "Miya"}`;
      setImgOrText(document.getElementById("charAvatar"), role.charAvatar, role.charName?.slice(0,2) || "他");
      setImgOrText(document.getElementById("userAvatar"), role.userAvatar, role.userName?.slice(0,2) || "妳");
      document.getElementById("avatarNote").textContent = `${role.charName || "角色"} × ${role.userName || "主控"}`;

      const cover = document.getElementById("coverImg");
      const empty = document.getElementById("emptyCover");
      const hero = document.getElementById("hero");
      if(role.cover){
        cover.src=role.cover; cover.classList.remove("hidden"); empty.classList.add("hidden");
        hero.classList.add("hasCover"); hero.classList.remove("noCover");
      }
      else {
        cover.removeAttribute("src");
        cover.classList.add("hidden"); empty.classList.remove("hidden");
        hero.classList.remove("hasCover"); hero.classList.add("noCover");
      }

      const ev = role.events[role.mainEvent] || role.events[0] || {title:"在一起的日子", date:"2025-12-15", quote:""};
      document.getElementById("mainLabel").textContent = ev.title;
      document.getElementById("mainDays").textContent = `+${daysSince(ev.date)} Days`;
      document.getElementById("mainSince").textContent = `since ${fmt(ev.date)}`;
      document.getElementById("mainQuote").textContent = ev.quote || "從那天起，世界多了一個只屬於你們的日期。";
      renderMilestones(ev.date);
      resetHeroScroll();

      const events = document.getElementById("events");
      events.innerHTML = "";
      role.events.forEach((e,i)=>{
        const item = document.createElement("div");
        item.className = "event" + (i===role.mainEvent ? " active" : "");
        item.innerHTML = `<div class="icon">${e.icon || "♡"}</div><div><div class="eventTitle">${e.title}</div><div class="eventDate">${e.date}</div></div><div class="eventDays">+${daysSince(e.date)}</div>`;
        item.onclick = ()=>{ role.mainEvent = i; save(); render(); };
        item.ondblclick = ()=> openEventDialog(i);
        events.appendChild(item);
      });
      renderRoleList();
    }
    function renderRoleList(){
      const list = document.getElementById("roleList");
      if(!list) return;
      list.innerHTML = "";
      state.roles.forEach((r,i)=>{
        const item = document.createElement("button");
        item.className = "roleItem" + (i===current ? " active" : "");
        item.innerHTML = `
          <span class="mini">${r.charAvatar ? `<img src="${r.charAvatar}">` : "♡"}</span>
          <span>
            <div class="roleMain">${String(i+1).padStart(2,"0")}・${r.charName || "空位"}</div>
            <div class="roleSub">${r.events?.length || 0} 個紀念日｜${r.theme || "theme"}</div>
          </span>`;
        item.onclick = ()=>{ current = i; save(); rolePickerDialog.close(); render(); };
        list.appendChild(item);
      });
    }

    async function cropImageToDataURL(file, targetRatio, maxW, maxH, quality=0.84){
      if(!file) return "";
      const img = await new Promise((resolve, reject)=>{
        const image = new Image();
        image.onload = ()=>resolve(image);
        image.onerror = reject;
        image.src = URL.createObjectURL(file);
      });

      const srcW = img.naturalWidth || img.width;
      const srcH = img.naturalHeight || img.height;
      const srcRatio = srcW / srcH;
      let sx=0, sy=0, sw=srcW, sh=srcH;

      if(srcRatio > targetRatio){
        sw = srcH * targetRatio;
        sx = (srcW - sw) / 2;
      }else if(srcRatio < targetRatio){
        sh = srcW / targetRatio;
        sy = (srcH - sh) / 2;
      }

      let outW = maxW;
      let outH = Math.round(maxW / targetRatio);
      if(outH > maxH){
        outH = maxH;
        outW = Math.round(maxH * targetRatio);
      }

      const canvas = document.createElement("canvas");
      canvas.width = outW;
      canvas.height = outH;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, outW, outH);
      URL.revokeObjectURL(img.src);
      return canvas.toDataURL("image/jpeg", quality);
    }

    
    function addDays(dateStr, days){
      const d = parseLocalDate(dateStr);
      d.setDate(d.getDate() + days);
      return localDateString(d);
    }
    function addYears(dateStr, years){
      const d = parseLocalDate(dateStr);
      d.setFullYear(d.getFullYear() + years);
      return localDateString(d);
    }
    function daysUntil(dateStr){
      const target = parseLocalDate(dateStr);
      const today = new Date(); today.setHours(0,0,0,0);
      target.setHours(0,0,0,0);
      return Math.ceil((target - today)/(1000*60*60*24));
    }
    function getUpcomingMilestones(startDate){
      if(!startDate) return [];
      const passed = Math.max(0, daysSince(startDate));
      const candidates = [];
      [100,200,300,400,500,600,700,800,900,1000].forEach(n=>{
        candidates.push({title:`${n}天`, date:addDays(startDate,n - 1), sort:n});
      });
      for(let y=1; y<=10; y++){
        candidates.push({title: y===1 ? "1周年" : `${y}周年`, date:addYears(startDate,y), sort:y*365.2425});
      }
      return candidates
        .filter(m => daysUntil(m.date) >= 0 && m.sort > passed)
        .sort((a,b)=> new Date(a.date) - new Date(b.date))
        .slice(0,3);
    }
    function renderMilestones(startDate){
      const wrap = document.getElementById("milestones");
      if(!wrap) return;
      const list = getUpcomingMilestones(startDate);
      wrap.innerHTML = "";
      list.forEach(m=>{
        const left = daysUntil(m.date);
        const item = document.createElement("div");
        item.className = "milestone";
        item.innerHTML = `
          <div class="milestoneIcon">💗</div>
          <div>
            <div class="milestoneTitle">${m.title}</div>
            <div class="milestoneDate">${m.date}</div>
          </div>
          <div class="milestoneBadge">D-${left}</div>`;
        wrap.appendChild(item);
      });
    }

const rolePickerDialog = document.getElementById("rolePickerDialog");
    document.getElementById("chooseRoleBtn").onclick = ()=>{ renderRoleList(); rolePickerDialog.showModal(); };

    const roleDialog = document.getElementById("roleDialog");
    roleDialog.addEventListener("close", render);
    themeInput.onchange = ()=> applyTheme(themeInput.value || "sakura");
    document.getElementById("editRoleBtn").onclick = ()=>{
      const r = state.roles[current];
      userNameInput.value = r.userName || "";
      charNameInput.value = r.charName || "";
      themeInput.value = r.theme || "sakura";
      userAvatarInput.value = ""; charAvatarInput.value = ""; coverInput.value = "";
      deleteCoverBtn.disabled = !r.cover;
      roleDialog.showModal();
    };
    document.getElementById("deleteCoverBtn").onclick = ()=>{
      const r = state.roles[current];
      r.cover = "";
      coverInput.value = "";
      save(); render();
      deleteCoverBtn.disabled = true;
    };
    document.getElementById("saveRoleBtn").onclick = async (ev)=>{
      ev.preventDefault();
      const r = state.roles[current];
      r.userName = userNameInput.value || "Miya";
      r.charName = charNameInput.value || `角色 ${current+1}`;
      r.theme = themeInput.value || "midnight";

      const ua = await cropImageToDataURL(userAvatarInput.files[0], 1, 320, 320, 0.86); if(ua) r.userAvatar = ua;
      const ca = await cropImageToDataURL(charAvatarInput.files[0], 1, 320, 320, 0.86); if(ca) r.charAvatar = ca;
      const co = await cropImageToDataURL(coverInput.files[0], 4/5, 960, 1200, 0.84); if(co) r.cover = co;

      save(); roleDialog.close(); render();
    };

    const eventDialog = document.getElementById("eventDialog");
    document.getElementById("addEventBtn").onclick = ()=>openEventDialog(null);
    function openEventDialog(i){
      editingEventIndex = i;
      const r = state.roles[current];
      const e = i==null ? {title:"", date:"", icon:"♡", quote:""} : r.events[i];
      eventDialogTitle.textContent = i==null ? "新增紀念日" : "編輯紀念日";
      eventTitleInput.value = e.title || "";
      eventIconInput.value = e.icon || "♡";
      eventDateInput.value = e.date || "";
      eventQuoteInput.value = e.quote || "";
      deleteEventBtn.style.display = i==null ? "none" : "inline-block";
      eventDialog.showModal();
    }
    document.getElementById("saveEventBtn").onclick = (ev)=>{
      ev.preventDefault();
      const r = state.roles[current];
      const data = {
        title:eventTitleInput.value || "紀念日",
        icon:eventIconInput.value || "♡",
        date:eventDateInput.value || new Date().toISOString().slice(0,10),
        quote:eventQuoteInput.value || ""
      };
      if(editingEventIndex==null){ r.events.push(data); r.mainEvent = r.events.length-1; }
      else r.events[editingEventIndex] = data;
      save(); eventDialog.close(); render();
    };
    document.getElementById("deleteEventBtn").onclick = (ev)=>{
      ev.preventDefault();
      const r = state.roles[current];
      if(editingEventIndex!=null && r.events.length>1){
        r.events.splice(editingEventIndex,1);
        r.mainEvent = Math.max(0, Math.min(r.mainEvent, r.events.length-1));
      }
      save(); eventDialog.close(); render();
    };



    function exportBackup(){
      const payload = {
        app: "角色紀念日卡冊",
        schemaVersion: 1,
        exportedAt: new Date().toISOString(),
        data: state
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const stamp = new Date().toISOString().slice(0,10).replaceAll("-","");
      a.href = url;
      a.download = `角色紀念日卡冊_備份_${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function normalizeImportedBackup(json){
      const data = json?.data || json;
      if(!data || !Array.isArray(data.roles)) throw new Error("備份格式不正確");
      const roles = data.roles.slice(0, MAX).map((role, i)=>({
        ...defaultRole(i),
        ...role,
        id: i,
        events: Array.isArray(role.events) && role.events.length ? role.events : defaultRole(i).events
      }));
      while(roles.length < MAX) roles.push(defaultRole(roles.length));
      return {
        current: Math.max(0, Math.min(Number(data.current || 0), MAX - 1)),
        roles
      };
    }

    function importBackupFile(file){
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        try{
          const imported = normalizeImportedBackup(JSON.parse(reader.result));
          const ok = confirm("匯入備份會覆蓋目前這台裝置上的角色資料。確定要匯入嗎？");
          if(!ok) return;
          state = imported;
          current = state.current || 0;
          save();
          render();
          roleDialog.close();
          alert("備份匯入完成。");
        }catch(err){
          alert("匯入失敗：這個 JSON 檔看起來不是有效的角色紀念日卡冊備份。");
        }finally{
          importBackupInput.value = "";
        }
      };
      reader.readAsText(file, "utf-8");
    }


    document.getElementById("exportBackupBtn").onclick = exportBackup;
    document.getElementById("importBackupBtn").onclick = ()=> importBackupInput.click();
    document.getElementById("importBackupInput").onchange = (ev)=> importBackupFile(ev.target.files[0]);

    // v0.25：暫停註冊 Service Worker，避免手機測試時吃舊快取。
    if("serviceWorker" in navigator){
      window.addEventListener("load", async ()=>{
        const regs = await navigator.serviceWorker.getRegistrations();
        for(const reg of regs) await reg.unregister();
      });
    }));
    }
    window.addEventListener("load", resetHeroScroll);
    window.addEventListener("pageshow", resetHeroScroll);
    render();
  </script>
